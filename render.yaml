databases:
  - name: pricewatch-db
    plan: free
    databaseName: amazon_notifier
    user: pricewatch

services:
  # Backend API
  - type: web
    name: pricewatch-api
    runtime: python
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host=0.0.0.0 --port=$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: pricewatch-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://pricewatch-ui.onrender.com","https://pricewatch-api-ovoj.onrender.com"]'
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: pricewatch-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://pricewatch-api-ovoj.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
