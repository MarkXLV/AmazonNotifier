databases:
  - name: pricewatch-db
    plan: free
    databaseName: amazon_notifier
    user: pricewatch

services:
  # --- Backend API ---
  - type: web
    name: pricewatch-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pricewatch-db
          property: connectionURI
        # Render gives psycopg2-style URLs; we transform in config.py
      - key: CORS_ORIGINS
        value: '["https://pricewatch-ui.onrender.com"]'
      - key: PYTHON_VERSION
        value: "3.11.6"
    healthCheckPath: /api/health

  # --- Frontend Static Site ---
  - type: web
    name: pricewatch-ui
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://pricewatch-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
